benchmark_metrics:
  - recall@5
  - recall@10
  - mrr

split_mode: dataset

lexical_conditions:
  - anchor_preserved
  - anchor_masked

methods:
  bm25:
    enabled: true
    top_k_values: [5, 10]
    grid:
      k1: [1.2, 1.8]
      b: [0.5, 0.75]
  dense:
    enabled: true
    top_k_values: [5, 10]
    grid:
      dimensions: [128, 256]
  colbert:
    enabled: true
    top_k_values: [5, 10]
    grid:
      dimensions: [64, 128]
  hybrid:
    enabled: true
    top_k_values: [5, 10]
    grid:
      k1: [1.2]
      b: [0.75]
      dimensions: [256]
      alpha: [0.3, 0.5, 0.7]
