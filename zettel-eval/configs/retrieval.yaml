benchmark_metrics:
  - map
  - hit@5
  - hit@10
  - mrr

split_mode: dataset

lexical_conditions:
  - anchor_preserved
  - anchor_masked

methods:
  bm25:
    enabled: false
    top_k_values: [5, 10]
    grid:
      k1: [1.2, 1.8]
      b: [0.5, 0.75]
  dense:
    enabled: false
    top_k_values: [5, 10]
    grid:
      dimensions: [1536]
  dense_nomic:
    enabled: false
    top_k_values: [5, 10]
    grid:
      dimensions: [768]
  hybrid:
    enabled: false
    top_k_values: [5, 10]
    grid:
      k1: [1.2]
      b: [0.75]
      dimensions: [1536]
      alpha: [0.1, 0.3, 0.5, 0.7, 0.9]
  hybrid_nomic:
    enabled: false
    top_k_values: [5, 10]
    grid:
      k1: [1.2]
      b: [0.75]
      dimensions: [768]
      alpha: [0.1, 0.3, 0.5, 0.7, 0.9]
  colbert:
    enabled: true
    top_k_values: [5, 10]
    grid: {}
